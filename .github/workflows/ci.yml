name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  swift:
    name: Swift package
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Run tests
        run: swift test
      - name: Confirm public API and UI-only boundary
        shell: bash
        run: |
          set -euo pipefail
          if grep -R "appName" Sources README.md; then
            echo "appName must not be part of FeedbackKit's public API or examples."
            exit 1
          fi
          if grep -R -E "UIPasteboard|NSPasteboard|apps\.apple\.com/app/id[0-9]" Sources; then
            echo "Clipboard implementations and app-specific App Store URLs belong to host apps."
            exit 1
          fi
          if grep -R -l "import UIKit" Sources | grep -v '^Sources/FeedbackKit/ShakeGestureDetector.swift$'; then
            echo "UIKit use must stay limited to the iOS shake gesture detector."
            exit 1
          fi
          grep -q "onWriteAppStoreReview" Sources/FeedbackKit/FeedbackSheet.swift

  skills:
    name: Agent Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate String Catalog JSON
        run: python3 -m json.tool Sources/FeedbackKit/Localizable.xcstrings > /dev/null
      - name: Discover repository skills
        shell: bash
        run: |
          set -euo pipefail
          npx -y skills add . --list | tee /tmp/skills.txt
          grep -q "integrate-feedbackkit-complete" /tmp/skills.txt
          grep -q "integrate-feedbackkit-firebase" /tmp/skills.txt
          grep -q "automate-feedback-github-issues" /tmp/skills.txt
          grep -q "add-feedbackkit-app-store-review" /tmp/skills.txt
      - name: Validate generated-file hygiene guidance
        shell: bash
        run: |
          set -euo pipefail
          for skill in \
            .agents/skills/integrate-feedbackkit-complete/SKILL.md \
            .agents/skills/integrate-feedbackkit-firebase/SKILL.md \
            .agents/skills/automate-feedback-github-issues/SKILL.md
          do
            grep -q 'firebase/functions/node_modules/' "$skill"
            grep -q 'firebase/functions/lib/' "$skill"
            grep -q 'git status --short --branch --untracked-files=all' "$skill"
          done
